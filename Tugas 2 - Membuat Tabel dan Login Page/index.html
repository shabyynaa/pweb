<!DOCTYPE html>
<html>
<head>
    <title>Tugas 2 - Tabel & Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        /* ===== TABLE STYLE ===== */
        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 50px;
        }

        td, th {
            border: 1px solid #dddddd;
            text-align: center;
            padding: 8px;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        th {
            background-color: #eda0e8;
            color: white;
        }

        /* ===== LOGIN STYLE ===== */
        .login-box {
            width: 300px;
            border: 1px solid #ccc;
            padding: 20px;
        }
    </style>
</head>

<body>

    <!-- ===== TABLE SECTION ===== -->
    <h2>List Nilai Siswa</h2>

    <table>
        <tr>
            <th rowspan="2">Nama</th>
            <th colspan="3">Nilai</th> 
        </tr>
        <tr>
            <th>Matematika</th>
            <th>Bahasa Indonesia</th>
            <th>Bahasa Inggris</th>
        </tr>

        <tr>
            <td>Irene</td>
            <td>100</td>
            <td>85</td>
            <td>90</td>
        </tr>

        <tr>
            <td>Jaehyun</td>
            <td>80</td>
            <td>90</td>
            <td>85</td>
        </tr>

        <tr>
            <td>Mark</td>
            <td>90</td>
            <td>80</td>
            <td>95</td>
        </tr>
    </table>

    <!-- ===== LOGIN SECTION ===== -->
    <div class="login-box">
        <h2>Login</h2>

        <form action="#" method="post">
            <label>Username:</label><br>
            <input type="text" name="username"><br><br>

            <label>Password:</label><br>
            <input type="password" name="password"><br><br>

            <input type="checkbox" name="remember">
            <label>Remember me</label><br><br>

            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
